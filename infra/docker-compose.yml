services:
  # 1. Base de Datos NoSQL
  mongodb:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    networks:
      - bigdata_network

  # 2. Spark Master (Construido con los conectores de Mongo)
  spark-master:
    build: ../spark   
    image: public.ecr.aws/bitnami/spark:3.5
    user: root     
    container_name: spark_master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark  # Forzamos un nombre de usuario
      - HOME=/tmp         # Definimos un Home absoluto para evitar el error de Ivy
    ports:
      - "8080:8080"        # UI de Spark
      - "7077:7077"        # Puerto de comunicación interna
    volumes:
      - ../spark:/opt/bitnami/spark/app  # MAPEO DE TUS SCRIPTS Y DATASET
    networks:
      - bigdata_network

  # 3. Spark Worker (Para que sea una arquitectura real)
  spark-worker:
    # Cambiamos el origen al registro de Amazon
    image: public.ecr.aws/bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - bigdata_network

  # 4. Microservicio API Flask
  flask-api:
    build: ../api
    container_name: flask_api
    depends_on:
      - mongodb
    ports:
      - "5000:5000"
    volumes:
      - ../spark:/opt/bitnami/spark/app  # ACCESO AL MODELO ENTRENADO
    networks:
      - bigdata_network

  # 5. Automatización Jenkins
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_ci
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bigdata_network

networks:
  bigdata_network:
    driver: bridge